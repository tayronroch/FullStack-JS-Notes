<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 562" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1016"/>
      <stop offset="100%" stop-color="#1A1B26"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B2CBF"/>
      <stop offset="100%" stop-color="#5A189A"/>
    </linearGradient>
    <linearGradient id="taskGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9D4EDD"/>
      <stop offset="100%" stop-color="#7B2CBF"/>
    </linearGradient>
    
    <!-- Markers for arrows -->
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#00F5D4"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#FFD166"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#06D6A0"/>
    </marker>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    .font-sans { font-family: system-ui, -apple-system, sans-serif; }
    .title { font-weight: 800; fill: #FFFFFF; }
    .subtitle { fill: #A0A0C0; font-size: 14px; }
    .label { font-size: 13px; font-weight: 600; }
    .label-yellow { fill: #FFD166; }
    .label-cyan { fill: #00F5D4; }
    .label-green { fill: #06D6A0; }
    .task-text { fill: #FFFFFF; font-size: 14px; font-weight: bold; }
    .box-title { font-size: 16px; font-weight: bold; fill: #00F5D4; }
    .box-subtitle { font-size: 11px; fill: #A0A0C0; }
  </style>

  <!-- Background -->
  <rect width="1000" height="562" fill="url(#bgGrad)"/>

  <!-- Left Sidebar (Cliente) -->
  <g filter="url(#shadow)">
    <rect x="0" y="0" width="100" height="562" fill="url(#clientGrad)"/>
    <!-- Vertical Text -->
    <text x="50" y="291" fill="#FFFFFF" font-size="28" font-weight="900" text-anchor="middle" letter-spacing="2" transform="rotate(-90 50 291)" class="font-sans">CLIENTE</text>
  </g>

  <!-- Event Loop Circle Group -->
  <g>
    <!-- Event Loop Circle (Counter-Clockwise) -->
    <!-- Left side (Top to Bottom, sweep=0) -->
    <path d="M 430,121 A 160,160 0 0,0 430,441" fill="none" stroke="#06D6A0" stroke-width="5" marker-end="url(#arrow-green)"/>
    <!-- Right side (Bottom to Top, sweep=0) -->
    <path d="M 430,441 A 160,160 0 0,0 430,121" fill="none" stroke="#06D6A0" stroke-width="5" marker-end="url(#arrow-green)"/>

    <!-- Central Text -->
    <text x="430" y="271" text-anchor="middle" class="font-sans title" font-size="34">EVENT LOOP</text>
    <text x="430" y="306" text-anchor="middle" class="font-sans subtitle">(Single thread &amp; Non-blocking I/O)</text>
  </g>

  <!-- Client Interaction Arrows -->
  <!-- Requisição (Yellow, dashed, pointing to Event Loop) -->
  <path d="M 100,440 L 260,440" fill="none" stroke="#FFD166" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrow-yellow)"/>
  <text x="180" y="420" text-anchor="middle" class="font-sans label label-yellow">Requisição</text>

  <!-- Resposta (Cyan, dashed, pointing to Client) -->
  <path d="M 260,125 L 110,125" fill="none" stroke="#00F5D4" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrow-cyan)"/>
  <text x="185" y="110" text-anchor="middle" class="font-sans label label-cyan">Resposta</text>

  <!-- Right Side Column: Call Stack -->
  <g transform="translate(770, 60)" filter="url(#shadow)">
    <!-- Main Box -->
    <rect width="190" height="200" fill="#1B1C26" stroke="#00F5D4" stroke-width="2" rx="8"/>
    <!-- Header -->
    <text x="95" y="30" text-anchor="middle" class="font-sans box-title">Call Stack</text>
    <text x="95" y="48" text-anchor="middle" class="font-sans box-subtitle">operações síncronas</text>
    
    <!-- Stack Elements -->
    <!-- Tarefa 3 -->
    <g transform="translate(20, 70)">
      <rect width="150" height="42" fill="url(#taskGrad)" rx="6"/>
      <text x="75" y="26" text-anchor="middle" class="font-sans task-text">Tarefa 3</text>
    </g>
    <!-- Tarefa 2 -->
    <g transform="translate(20, 130)">
      <rect width="150" height="42" fill="url(#taskGrad)" rx="6"/>
      <text x="75" y="26" text-anchor="middle" class="font-sans task-text">Tarefa 2</text>
    </g>
  </g>

  <!-- Right Side Column: Event Queue -->
  <g transform="translate(770, 320)" filter="url(#shadow)">
    <!-- Main Box -->
    <rect width="190" height="180" fill="#1B1C26" stroke="#06D6A0" stroke-width="2" rx="8"/>
    <!-- Header -->
    <text x="95" y="30" text-anchor="middle" class="font-sans box-title" fill="#06D6A0">Event Queue</text>
    <text x="95" y="48" text-anchor="middle" class="font-sans box-subtitle">operações assíncronas</text>
    
    <!-- Queue Elements -->
    <!-- Tarefa 3 -->
    <g transform="translate(20, 80)">
      <rect width="150" height="42" fill="url(#taskGrad)" rx="6"/>
      <text x="75" y="26" text-anchor="middle" class="font-sans task-text">Tarefa 3</text>
    </g>
  </g>

  <!-- Connection Paths from Event Loop to Call Stack / Event Queue -->
  <!-- Main splitting line from right of Event Loop (x=590, y=281) -->
  <path d="M 590,281 L 680,281" fill="none" stroke="#A0A0C0" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Branch to Call Stack -->
  <path d="M 680,281 L 680,180 L 760,180" fill="none" stroke="#A0A0C0" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-cyan)"/>
  <text x="665" y="220" text-anchor="middle" transform="rotate(-90 665 220)" class="font-sans subtitle" font-size="11">síncrono</text>

  <!-- Branch to Event Queue -->
  <path d="M 680,281 L 680,380 L 760,380" fill="none" stroke="#A0A0C0" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-green)"/>
  <text x="665" y="340" text-anchor="middle" transform="rotate(-90 665 340)" class="font-sans subtitle" font-size="11" fill="#A0A0C0">assíncronos</text>

  <!-- Connection: Pronto (Event Queue -> Call Stack) -->
  <path d="M 865,320 L 865,270" fill="none" stroke="#A0A0C0" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-cyan)"/>
  <text x="850" y="300" text-anchor="middle" transform="rotate(-90 850 300)" class="font-sans subtitle" font-size="11">Pronto</text>

  <!-- Connection: Operação Completa (Call Stack -> Event Loop) -->
  <path d="M 770,110 L 610,110" fill="none" stroke="#00F5D4" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-cyan)"/>
  <text x="690" y="95" text-anchor="middle" class="font-sans label label-cyan" font-size="12">Operação completa</text>

</svg>
